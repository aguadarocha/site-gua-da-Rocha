<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="doc-title">Categoria — Água da Rocha</title>
<meta name="description" content="E-books gratuitos por categoria no Água da Rocha.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><path fill=%22%2314B8A6%22 d=%22M12 2C12 2 5 11.5 5 15.5C5 19.6 8.4 23 12 23C15.6 23 19 19.6 19 15.5C19 11.5 12 2 12 2Z%22/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header id="site-header"></header>

<main>
  <section class="page-hero">
    <div class="container">
      <div class="breadcrumb">
        <a href="../index.html">Início</a><span class="sep">/</span>
        <a href="index.html">Categorias</a><span class="sep">/</span>
        <span id="crumb-current"></span>
      </div>
      <p class="eyebrow" style="margin-top:22px;">Categoria</p>
      <h1 id="cat-title">Categoria</h1>
      <p id="cat-subtitle"></p>
    </div>
  </section>

  <section style="padding-top:20px;">
    <div class="container">
      <div class="category-tabs" id="category-tabs"></div>
      <div id="cat-grid" class="book-grid"></div>
      <p id="empty-state" class="grid-empty" style="display:none;">Ainda não há e-books nesta categoria. Volte em breve — o acervo cresce continuamente.</p>
    </div>
  </section>
</main>

<footer id="site-footer"></footer>

<script src="../js/data.js"></script>
<script src="../js/main.js"></script>
<script>
  const ROOT = "../";
  initCommon(ROOT, "categorias/index.html");

  const params = new URLSearchParams(window.location.search);
  const slug = params.get("cat") || "";
  const cat = getCategory(slug);

  document.getElementById("doc-title").textContent = `${cat.name} — Água da Rocha`;
  document.getElementById("cat-title").textContent = cat.name;
  document.getElementById("crumb-current").textContent = cat.name;
  document.getElementById("cat-subtitle").textContent = `E-books gratuitos sobre ${cat.name.toLowerCase()}.`;

  const tabsEl = document.getElementById("category-tabs");
  tabsEl.innerHTML = CATEGORIES.map(c => `<a href="categoria.html?cat=${c.slug}" class="${c.slug === slug ? 'active' : ''}">${c.name}</a>`).join("");

  const list = EBOOKS.filter(b => b.category === slug);
  const grid = document.getElementById("cat-grid");
  const empty = document.getElementById("empty-state");
  if (list.length === 0) {
    grid.innerHTML = "";
    empty.style.display = "block";
  } else {
    grid.innerHTML = list.map(b => bookCardHtml(ROOT, b)).join("");
  }

  initLazyLoad();
  initReveal();
</script>
</body>
</html>
