<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categorias — Água da Rocha</title>
<meta name="description" content="Explore todas as categorias de e-books gratuitos do Água da Rocha.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><path fill=%22%2314B8A6%22 d=%22M12 2C12 2 5 11.5 5 15.5C5 19.6 8.4 23 12 23C15.6 23 19 19.6 19 15.5C19 11.5 12 2 12 2Z%22/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header id="site-header"></header>

<main>
  <section class="page-hero">
    <div class="container">
      <div class="breadcrumb"><a href="../index.html">Início</a><span class="sep">/</span>Categorias</div>
      <p class="eyebrow" style="margin-top:22px;">Explore por tema</p>
      <h1>Categorias</h1>
      <p>Cada categoria reúne e-books gratuitos organizados por assunto, para você ir direto ao que mais importa.</p>
    </div>
  </section>

  <section>
    <div class="container">
      <div id="categories-grid" class="pillar-grid"></div>
    </div>
  </section>
</main>

<footer id="site-footer"></footer>

<script src="../js/data.js"></script>
<script src="../js/main.js"></script>
<script>
  const ROOT = "../";
  initCommon(ROOT, "categorias/index.html");

  const catIcons = { sprout: ICONS.drop, "book-open": ICONS.pages, target: ICONS.check, repeat: ICONS.arrowUp, brain: ICONS.heart, "message-circle": ICONS.share, heart: ICONS.heart, coins: ICONS.check, droplet: ICONS.drop, scroll: ICONS.pages, book: ICONS.pages, home: ICONS.check, compass: ICONS.globe };

  document.getElementById("categories-grid").innerHTML = CATEGORIES.map(c => `
    <a class="pillar-card reveal" href="categoria.html?cat=${c.slug}">
      ${catIcons[c.icon] || ICONS.drop}
      <h3>${c.name}</h3>
      <p>${EBOOKS.filter(b => b.category === c.slug).length} e-book(s) disponível(is)</p>
    </a>
  `).join("");

  initReveal();
</script>
</body>
</html>
